services:
  - type: web
    name: crestar-flow-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MARKET_MODEL
        value: gpt-4.1-mini
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
